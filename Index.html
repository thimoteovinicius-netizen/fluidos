<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora Termodinâmica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

h1{text-align:center;}

label{display:block;margin-top:15px;}

input, select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:5px;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#020617;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Calculadora Termodinâmica</h1>

<label>Fluido</label>
<select id="fluido">
  <option value="agua">Água</option>
  <option value="etanol">Etanol</option>
  <option value="metanol">Metanol</option>
  <option value="isopropanol">Isopropanol</option>
</select>

<label>Tipo de Pressão</label>
<select id="tipoPressao">
  <option value="abs">Absoluta (bar abs)</option>
  <option value="rel">Relativa (bar g)</option>
</select>

<label>Temperatura (°C)</label>
<input type="number" id="temp" oninput="calcFromTemp()">

<label>Pressão</label>
<input type="number" id="press" oninput="calcFromPress()">

<div class="result" id="resultado">
Aguardando entrada...
</div>

<button onclick="gerarPDF()">Gerar PDF</button>

</div>

<script>

const Patm = 1.013; // bar

const fluidos = {
  agua: {A:8.14019, B:1810.94, C:244.485},
  etanol: {A:8.20417, B:1642.89, C:230.300},
  metanol: {A:8.08097, B:1582.27, C:239.726},
  isopropanol: {A:8.11778, B:1580.92, C:219.620}
};

function getConstantes(){
  return fluidos[fluido.value];
}

function tempToPressure(T){
  const {A,B,C} = getConstantes();
  const P_mmHg = 10**(A - (B/(T + C)));
  return P_mmHg * 0.00133322;
}

function pressureToTemp(Pabs){
  let Tmin=0, Tmax=200, Tmid;

  for(let i=0;i<40;i++){
    Tmid=(Tmin+Tmax)/2;
    const Pcalc=tempToPressure(Tmid);

    if(Pcalc > Pabs){
      Tmax=Tmid;
    }else{
      Tmin=Tmid;
    }
  }

  return Tmid;
}

function getTipo(){
  return tipoPressao.value;
}

// T → P
function calcFromTemp(){
  const T = Number(temp.value);
  if(isNaN(T)) return;

  let Pabs = tempToPressure(T);
  let Pmostrar = (getTipo()==="rel") ? (Pabs - Patm) : Pabs;

  press.value = Pmostrar.toFixed(3);

  mostrarResultado(T, Pabs);
}

// P → T
function calcFromPress(){
  let Pinput = Number(press.value);
  if(isNaN(Pinput)) return;

  let Pabs = (getTipo()==="rel") ? (Pinput + Patm) : Pinput;

  const T = pressureToTemp(Pabs);

  temp.value = T.toFixed(1);

  mostrarResultado(T, Pabs);
}

function mostrarResultado(T, Pabs){
  const fluidoNome = fluido.selectedOptions[0].text;
  const Prel = Pabs - Patm;

  resultado.innerHTML = `
    <b>Resultado:</b><br>
    Fluido: ${fluidoNome}<br>
    Temperatura: ${T.toFixed(2)} °C<br>
    Pressão absoluta: ${Pabs.toFixed(3)} bar<br>
    Pressão relativa: ${Prel.toFixed(3)} bar<br>
    <small>Base: Equação de Antoine</small>
  `;
}

function gerarPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const T = temp.value;
  const tipo = tipoPressao.value;
  const fluidoNome = fluido.selectedOptions[0].text;

  let Pinput = Number(press.value);
  let Pabs = (tipo==="rel") ? (Pinput + Patm) : Pinput;
  let Prel = Pabs - Patm;

  pdf.text("Relatório Termodinâmico", 10, 10);
  pdf.text(`Fluido: ${fluidoNome}`, 10, 20);
  pdf.text(`Temperatura: ${T} °C`, 10, 30);
  pdf.text(`Pressão absoluta: ${Pabs.toFixed(3)} bar`, 10, 40);
  pdf.text(`Pressão relativa: ${Prel.toFixed(3)} bar`, 10, 50);

  pdf.save("relatorio_termodinamico.pdf");
}

</script>

</body>
</html>
