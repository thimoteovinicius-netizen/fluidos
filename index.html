<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Termodinâmica - Água Saturada</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

h1{
    text-align:center;
}

label{
    display:block;
    margin-top:12px;
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.resultado{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:10px;
}

.item{
    margin-bottom:8px;
}

.historico{
    margin-top:20px;
    background:#0b1220;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🌡️ Calculadora Termodinâmica</h1>

<div class="card">

<label>Modo</label>

<select id="modo">

<option value="tp">
Temperatura → Pressão
</option>

<option value="pt">
Pressão → Temperatura
</option>

</select>

<label id="rotuloEntrada">
Temperatura (°C)
</label>

<input
type="number"
step="0.01"
id="entrada">

<button onclick="calcular()">
CALCULAR
</button>

<div id="resultado" class="resultado">

Aguardando cálculo...

</div>

<div class="historico">

<h3>Histórico</h3>

<div id="historico">
Nenhum cálculo realizado.
</div>

</div>

</div>

</div>

<script>

const historico=[];

document
.getElementById("modo")
.addEventListener("change",function(){

const lbl =
document.getElementById("rotuloEntrada");

if(this.value==="tp"){
    lbl.innerHTML="Temperatura (°C)";
}else{
    lbl.innerHTML="Pressão Absoluta (bar)";
}

});

function pressaoSaturacao(T){

// Equação de Tetens
// Resultado em kPa

const p =
0.61078 *
Math.exp(
(17.27*T)/(T+237.3)
);

return p;

}

function temperaturaSaturacao(kPa){

let Tmin=0;
let Tmax=200;

for(let i=0;i<60;i++){

let Tmid=(Tmin+Tmax)/2;

let pmid=
pressaoSaturacao(Tmid);

if(pmid<kPa){
Tmin=Tmid;
}
else{
Tmax=Tmid;
}

}

return (Tmin+Tmax)/2;

}

function calcular(){

const modo=
document.getElementById("modo").value;

const valor=
parseFloat(
document.getElementById("entrada").value
);

if(isNaN(valor)){
alert("Digite um valor.");
return;
}

let temperatura;
let bara;

if(modo==="tp"){

temperatura=valor;

const kPa=
pressaoSaturacao(temperatura);

bara=kPa/100;

}
else{

bara=valor;

const kPa=
bara*100;

temperatura=
temperaturaSaturacao(kPa);

}

mostrarResultado(
temperatura,
bara
);

}

function mostrarResultado(
temperatura,
bara
){

const barg=
bara-1.01325;

const kPa=
bara*100;

const MPa=
bara/10;

const psi=
bara*14.5038;

const torr=
bara*750.0617;

const mtorr=
torr*1000;

let faixa="";

if(bara<1){

faixa="Subatmosférico";

}
else if(bara<3){

faixa="Esterilização Hospitalar";

}
else if(bara<6){

faixa="Esterilização Industrial";

}
else{

faixa="Alta Pressão";

}

document
.getElementById("resultado")
.innerHTML=`

<div class="item">
<b>Temperatura:</b>
${temperatura.toFixed(2)} °C
</div>

<div class="item">
<b>Pressão Absoluta:</b>
${bara.toFixed(4)} bar(a)
</div>

<div class="item">
<b>Pressão Manométrica:</b>
${barg.toFixed(4)} bar(g)
</div>

<div class="item">
<b>kPa:</b>
${kPa.toFixed(2)}
</div>

<div class="item">
<b>MPa:</b>
${MPa.toFixed(4)}
</div>

<div class="item">
<b>PSI:</b>
${psi.toFixed(2)}
</div>

<div class="item">
<b>Torr:</b>
${torr.toFixed(0)}
</div>

<div class="item">
<b>mTorr:</b>
${mtorr.toFixed(0)}
</div>

<div class="item">
<b>Classificação:</b>
${faixa}
</div>

`;

historico.unshift(
`${temperatura.toFixed(2)} °C → ${bara.toFixed(4)} bar(a)`
);

if(historico.length>10){
historico.pop();
}

document
.getElementById("historico")
.innerHTML=
historico.join("<br>");

}

</script>

</body>
</html>
