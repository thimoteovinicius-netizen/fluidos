<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toolkit Técnico V2</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:#111827;padding:15px}
.sidebar h2{font-size:18px}
.sidebar button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;cursor:pointer}
.content{margin-left:240px;padding:20px}
.tab{display:none;background:#1e293b;padding:20px;border-radius:12px}
.tab.active{display:block}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button.action{background:#22c55e}
</style>
</head>
<body>

<div class="sidebar">
<h2>Toolkit Técnico V2</h2>
<button onclick="openTab('inicio')">🏠 Início</button>
<button onclick="openTab('eletrica')">⚡ Elétrica</button>
<button onclick="openTab('conversoes')">📏 Conversões</button>
<button onclick="openTab('termo')">🌡️ Termodinâmica</button>
<button onclick="openTab('cabos')">🔌 Cabos</button>
<button onclick="openTab('nr13')">🏭 NR-13</button>
</div>

<div class="content">

<div id="inicio" class="tab active">
<h1>Toolkit Técnico V2</h1>
<p>Base para elétrica, termodinâmica, NR-13 e engenharia.</p>
</div>

<div id="eletrica" class="tab">
<h2>Lei de Ohm</h2>
<input id="v" placeholder="Volts (V)">
<input id="i" placeholder="Corrente (A)">
<input id="r" placeholder="Resistência (Ω)">
<button class="action" onclick="ohm()">Calcular</button>
<p id="ohmRes"></p>
</div>

<div id="conversoes" class="tab">
<h2>Conversão de Pressão</h2>
<input type="number" id="bar" placeholder="Pressão em bar">
<button class="action" onclick="conv()">Converter</button>
<p id="convRes"></p>
</div>

<div id="termo" class="tab">
<h2>Termodinâmica</h2>
<p>Módulo reservado para integração da calculadora de saturação.</p>
</div>

<div id="cabos" class="tab">
<h2>Cabos e Disjuntores</h2>
<p>Módulo reservado para V2.1.</p>
</div>

<div id="nr13" class="tab">
<h2>NR-13</h2>
<p>Módulo reservado para V2.1.</p>
</div>

</div>

<script>
function openTab(id){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function ohm(){
 let V=parseFloat(document.getElementById('v').value);
 let I=parseFloat(document.getElementById('i').value);
 let R=parseFloat(document.getElementById('r').value);

 if(!isNaN(V)&&!isNaN(I)&&isNaN(R)) R=V/I;
 else if(!isNaN(V)&&!isNaN(R)&&isNaN(I)) I=V/R;
 else if(!isNaN(I)&&!isNaN(R)&&isNaN(V)) V=I*R;

 document.getElementById('ohmRes').innerHTML =
 `V=${V||0} V<br>I=${I||0} A<br>R=${R||0} Ω`;
}

function conv(){
 let bar=parseFloat(document.getElementById('bar').value)||0;
 let psi=bar*14.5038;
 let torr=bar*750.062;
 let mtorr=torr*1000;

 document.getElementById('convRes').innerHTML =
 `PSI: ${psi.toFixed(2)}<br>
 Torr: ${torr.toFixed(2)}<br>
 mTorr: ${mtorr.toFixed(0)}`;
}
</script>

</body>
</html>
